openapi: 3.1.0
info:
  title: Enum Addition API
  version: 1.1.0
paths:
  /subscriptions:
    get:
      operationId: listSubscriptions
      responses:
        "200":
          description: Subscription payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    type: string
                    enum:
                      - active
                      - paused

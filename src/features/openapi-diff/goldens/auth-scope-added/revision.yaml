openapi: 3.1.0
info:
  title: Auth Scope API
  version: 1.1.0
paths:
  /exports/accounts:
    get:
      operationId: getAccountExport
      security:
        - oauth2:
            - accounts:read
            - accounts:export
      responses:
        "200":
          description: ok
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://auth.example.com/oauth/token
          scopes:
            accounts:read: Read account exports
            accounts:export: Export account data
